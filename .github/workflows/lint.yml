# Elvis lint + eunit for hecate-grid.
#
# Codeberg is canonical; this runs on the GitHub push-mirror (Forgejo Actions
# disabled per the migration pattern). Keeps the org's structural rules honest:
# no deep nesting (max one meaningful level), no nested try/catch, no if.
#
# The macula NIF is NOT needed here: the sensor publishes but never encodes at
# rest, and nothing under test touches the mesh or mints a UCAN. So no Rust
# toolchain, and the run stays fast. The moment a test packs CBOR or mints an
# identity, add the source-NIF build the way hecate-archive's lint does, and
# never a fetched artifact (see reference_ci_nif_source_build).
name: lint-and-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4
      - name: Elvis lint
        run: rebar3 lint
      - name: EUnit
        run: rebar3 eunit
